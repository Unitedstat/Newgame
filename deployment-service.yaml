apiVersion: apps/v1
kind: Deployment
metadata:
  name: newgame-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: newgame
  template:
    metadata:
      labels:
        app: newgame
    spec:
      containers:
      - name: newgame
        image: kuday/newgame:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: newgame-service
spec:
  selector:
    app: newgame
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort
